<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 热点新闻追踪</title>
    <meta name="description" content="AI 热点新闻自动追踪与总结，每 6 小时自动更新">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="site-header">
            <div class="header-top">
                <h1 class="site-title">AI 热点新闻</h1>
                <a href="https://github.com/yestrar123/ai-news-tracker/actions/workflows/update.yml" class="refresh-btn" target="_blank">↻ 手动刷新</a>
            </div>
            <p class="site-subtitle">自动追踪 &amp; AI 总结 · 每 6 小时更新</p>
            <p class="update-info">上次更新：暂无 · 共 0 条新闻</p>
        </header>

        <main class="news-grid">
            
    <div class="empty-state">
        <div class="empty-icon">📡</div>
        <h2>暂无新闻</h2>
        <p>数据尚未生成，请等待首次自动更新。</p>
        <p>首次部署后，GitHub Actions 将在 6 小时内自动运行。</p>
        <p>你也可以前往 <a href="https://github.com/yestrar123/ai-news-tracker/actions/workflows/update.yml" target="_blank">GitHub Actions</a> 手动触发更新。</p>
    </div>
        </main>

        <footer class="site-footer">
            <p>由 GitHub Actions 定时驱动 · AI 总结由 DeepSeek V4 生成</p>
            <p><a href="https://github.com/yestrar123/ai-news-tracker/actions/workflows/update.yml" target="_blank">手动触发更新</a></p>
        </footer>
    </div>
</body>
</html>
