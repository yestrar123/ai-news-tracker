name: Manage Article

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options:
          - delete
          - restore
      article_url:
        description: 'Article URL'
        required: true
        type: string
      article_title:
        description: 'Article title (optional)'
        required: false
        type: string

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run manage script
        run: |
          python scripts/manage_article.py \
            --action ${{ github.event.inputs.action }} \
            --url "${{ github.event.inputs.article_url }}" \
            --title "${{ github.event.inputs.article_title }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html archive.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "manage: ${{ github.event.inputs.action }} article"
            git push
          fi
